<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVR Trading — XAUUSD Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0b1929; color:#e0e0e0; font-family:'Segoe UI',sans-serif; min-height:100vh; }

  header { background:#0d2137; border-bottom:1px solid #1e3a5f; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .logo { font-size:18px; font-weight:700; color:#ffd234; letter-spacing:1px; }
  .logo span { color:#9e9e9e; font-weight:400; font-size:13px; margin-left:8px; }
  .refresh-btn { background:#1e3a5f; border:1px solid #2a5a8f; color:#7ab8f5; padding:7px 14px; border-radius:6px; cursor:pointer; font-size:12px; }
  .refresh-btn:hover { background:#2a5a8f; color:#fff; }

  .container { max-width:900px; margin:0 auto; padding:20px 16px; }

  /* Status card */
  .status-card { border-radius:12px; padding:20px; margin-bottom:20px; border:1px solid; }
  .status-card.long  { background:#0d2e1a; border-color:#26a69a; }
  .status-card.short { background:#2e0d0d; border-color:#ef5350; }
  .status-card.wacht { background:#1a1a0d; border-color:#ffd234; }
  .status-card.loading { background:#111e2e; border-color:#1e3a5f; }

  .status-top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .beslissing { font-size:28px; font-weight:700; }
  .beslissing.long  { color:#26a69a; }
  .beslissing.short { color:#ef5350; }
  .beslissing.wacht { color:#ffd234; }
  .prijs { font-size:22px; font-weight:600; color:#fff; }
  .score-badge { background:#1e3a5f; color:#7ab8f5; padding:4px 12px; border-radius:20px; font-size:13px; }
  .timestamp { color:#9e9e9e; font-size:12px; margin-top:8px; }

  /* Trade levels */
  .levels-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:16px; }
  .level-box { background:#0b1929; border-radius:8px; padding:12px 14px; border:1px solid #1e3a5f; }
  .level-label { font-size:11px; color:#9e9e9e; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .level-value { font-size:18px; font-weight:700; }
  .level-value.entry { color:#ffffff; }
  .level-value.sl     { color:#ef5350; }
  .level-value.tp1    { color:#66bb6a; }
  .level-value.tp2    { color:#66bb6a; }

  /* Chart */
  .chart-section { margin-bottom:20px; }
  .section-title { font-size:13px; color:#9e9e9e; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .chart-img { width:100%; border-radius:10px; border:1px solid #1e3a5f; display:block; }
  .no-chart { background:#111e2e; border:1px solid #1e3a5f; border-radius:10px; padding:40px; text-align:center; color:#9e9e9e; font-size:13px; }

  /* Trend */
  .trend-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .trend-box { background:#111e2e; border-radius:8px; padding:12px; text-align:center; border:1px solid #1e3a5f; }
  .trend-tf { font-size:11px; color:#9e9e9e; margin-bottom:6px; }
  .trend-val { font-size:13px; font-weight:600; }
  .trend-val.bullish { color:#26a69a; }
  .trend-val.bearish { color:#ef5350; }
  .trend-val.neutraal { color:#ffd234; }

  /* History */
  .history-list { display:flex; flex-direction:column; gap:8px; }
  .history-item { background:#111e2e; border-radius:8px; padding:12px 14px; border:1px solid #1e3a5f; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
  .history-time { color:#9e9e9e; font-size:12px; }
  .history-price { color:#e0e0e0; font-size:14px; font-weight:600; }
  .history-dec { font-size:13px; font-weight:700; padding:3px 10px; border-radius:12px; }
  .history-dec.long  { background:#0d2e1a; color:#26a69a; }
  .history-dec.short { background:#2e0d0d; color:#ef5350; }
  .history-dec.wacht { background:#1a1a0d; color:#ffd234; }

  /* Footer */
  footer { text-align:center; color:#9e9e9e; font-size:11px; padding:30px 20px; border-top:1px solid #1e3a5f; margin-top:20px; }
  footer a { color:#7ab8f5; text-decoration:none; }

  .loading-txt { color:#9e9e9e; font-size:14px; text-align:center; padding:40px; }
</style>
</head>
<body>

<header>
  <div class="logo">MVR Trading <span>XAUUSD • Gold</span></div>
  <button class="refresh-btn" onclick="location.reload()">↻ Vernieuwen</button>
</header>

<div class="container">

  <!-- LATEST STATUS -->
  <div id="status-card" class="status-card loading">
    <p class="loading-txt">Laatste analyse laden...</p>
  </div>

  <!-- CHART -->
  <div class="chart-section">
    <div class="section-title">4H Grafiek</div>
    <div id="chart-container"><div class="no-chart">Grafiek wordt geladen...</div></div>
  </div>

  <!-- TREND -->
  <div class="section-title">Trend — Top Down</div>
  <div class="trend-grid" id="trend-grid">
    <div class="trend-box"><div class="trend-tf">Weekly</div><div class="trend-val" id="wt">—</div></div>
    <div class="trend-box"><div class="trend-tf">Daily</div><div class="trend-val" id="dt">—</div></div>
    <div class="trend-box"><div class="trend-tf">4H</div><div class="trend-val" id="h4t">—</div></div>
  </div>

  <!-- HISTORY -->
  <div class="section-title" style="margin-bottom:10px">Laatste Updates</div>
  <div class="history-list" id="history-list">
    <div class="loading-txt">Geschiedenis laden...</div>
  </div>

</div>

<footer>
  MVR Trading Agent • Auto-update elke 4 uur •
  <a href="https://github.com/MattsVR420/trading-gold" target="_blank">GitHub Repo</a>
</footer>

<script>
// Laad data uit latest.json
async function loadDashboard() {
  try {
    const r = await fetch('latest.json?t=' + Date.now());
    if (!r.ok) throw new Error('Geen data');
    const d = await r.json();

    const dec = (d.beslissing || 'WACHT').toUpperCase();
    const cls = dec.includes('LONG') ? 'long' : dec.includes('SHORT') ? 'short' : 'wacht';

    // Status card
    document.getElementById('status-card').className = `status-card ${cls}`;
    document.getElementById('status-card').innerHTML = `
      <div class="status-top">
        <div class="beslissing ${cls}">${dec}</div>
        <div class="prijs">$${d.prijs || '—'}</div>
        <div class="score-badge">Score: ${d.score >= 0 ? '+' : ''}${d.score || 0}</div>
      </div>
      <div class="timestamp">Laatste analyse: ${d.tijdstip || '—'} UTC</div>
      ${dec !== 'WACHT' ? `
      <div class="levels-grid">
        <div class="level-box"><div class="level-label">Entry</div><div class="level-value entry">$${d.entry || '—'}</div></div>
        <div class="level-box"><div class="level-label">Stop Loss</div><div class="level-value sl">$${d.sl || '—'}</div></div>
        <div class="level-box"><div class="level-label">TP1 (1:1.5)</div><div class="level-value tp1">$${d.tp1 || '—'}</div></div>
        <div class="level-box"><div class="level-label">TP2 (1:3)</div><div class="level-value tp2">$${d.tp2 || '—'}</div></div>
      </div>` : '<div style="margin-top:12px;color:#9e9e9e;font-size:13px">Geen actieve trade — wacht op betere confluëntie.</div>'}
    `;

    // Chart
    if (d.chart) {
      document.getElementById('chart-container').innerHTML =
        `<img src="${d.chart}?t=${Date.now()}" class="chart-img" alt="XAUUSD Chart" onerror="this.parentElement.innerHTML='<div class=no-chart>Grafiek tijdelijk niet beschikbaar</div>'">`;
    }

    // Trend
    const trends = ['wt','dt','h4t'];
    const vals = [d.weekly_trend, d.daily_trend, d.h4_trend];
    trends.forEach((id, i) => {
      const el = document.getElementById(id);
      const v = (vals[i] || 'NEUTRAAL').toUpperCase();
      el.textContent = v.includes('BULL') ? '▲ BULLISH' : v.includes('BEAR') ? '▼ BEARISH' : '→ NEUTRAAL';
      el.className = 'trend-val ' + (v.includes('BULL') ? 'bullish' : v.includes('BEAR') ? 'bearish' : 'neutraal');
    });

    // History
    if (d.history && d.history.length) {
      document.getElementById('history-list').innerHTML = d.history.slice(0,8).map(h => {
        const hcls = (h.beslissing||'').includes('LONG') ? 'long' : (h.beslissing||'').includes('SHORT') ? 'short' : 'wacht';
        return `<div class="history-item">
          <span class="history-time">${h.tijdstip} UTC</span>
          <span class="history-price">$${h.prijs}</span>
          <span class="history-dec ${hcls}">${h.beslissing}</span>
        </div>`;
      }).join('');
    }

  } catch(e) {
    document.getElementById('status-card').innerHTML =
      `<p style="color:#9e9e9e;padding:10px">Data nog niet beschikbaar. De eerste analyse volgt automatisch.<br><br><small>${e.message}</small></p>`;
  }
}

loadDashboard();
// Auto-refresh elke 5 minuten
setInterval(() => loadDashboard(), 300000);
</script>
</body>
</html>
