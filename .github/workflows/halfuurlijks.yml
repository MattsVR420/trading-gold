name: XAUUSD Halfuurlijkse Analyse (tijdelijk)

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Tijdvenster controleren (stop na 20:47 UTC = 22:47 Belgisch)
        id: tijdcheck
        run: |
          NOW=$(date -u +%s)
          EINDE=$(date -u -d "2026-06-19 20:47:00" +%s)
          if [ "$NOW" -gt "$EINDE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Buiten tijdvenster - overgeslagen"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            RESTANT=$(( (EINDE - NOW) / 60 ))
            echo "Binnen tijdvenster - nog ${RESTANT} min te gaan"
          fi

      - name: Checkout repo
        if: steps.tijdcheck.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python instellen
        if: steps.tijdcheck.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        if: steps.tijdcheck.outputs.skip == 'false'
        run: pip install yfinance pandas matplotlib --quiet

      - name: Twilio credentials aanmaken
        if: steps.tijdcheck.outputs.skip == 'false'
        run: |
          printf '{"sid":"%s","token":"%s"}' "$TWILIO_SID" "$TWILIO_TOKEN" > creds.json
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}

      - name: Analyse uitvoeren
        if: steps.tijdcheck.outputs.skip == 'false'
        run: python run.py
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}

      - name: Resultaten pushen naar GitHub
        if: steps.tijdcheck.outputs.skip == 'false'
        run: |
          git config user.email "bot@mvr.be"
          git config user.name "MVR Bot"
          git add reports/ charts/ latest.json "dagboek traden/" || true
          git diff --cached --quiet || git commit -m "XAUUSD halfuur $(date -u +%Y-%m-%d_%H%M) UTC"
          git push
