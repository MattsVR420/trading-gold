name: XAUUSD Systeem Watchdog

on:
  schedule:
    # Primaire motor: elke 30 min — triggert analyse als GitHub cron het laat afweten
    - cron: '0,30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Controleer systeem en trigger analyse indien nodig
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== XAUUSD Watchdog ==="
          date -u

          # Laatste analyse ophalen via latest.json (niet commit — code-pushes vertekenen commit-tijd)
          LAST=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://raw.githubusercontent.com/MattsVR420/trading-gold/main/latest.json" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tijdstip'])" 2>/dev/null || echo "")
          echo "Laatste analyse: $LAST"

          NOW=$(date -u +%s)
          if [ -z "$LAST" ]; then
            ANALYSE_TS=0
            MINUTEN=999
          else
            ANALYSE_TS=$(date -u -d "$LAST UTC" +%s 2>/dev/null || echo 0)
            if [ "$ANALYSE_TS" -eq 0 ]; then
              MINUTEN=999
            else
              MINUTEN=$(( (NOW - ANALYSE_TS) / 60 ))
            fi
          fi
          echo "Minuten geleden: $MINUTEN"

          # Sessie-uren (UTC): sessie1=04-09u (06-11 CEST), break, sessie2=13-20u (15-22 CEST)
          # Strikte grenzen: < 10 en < 21 zodat sessie exact eindigt
          HOUR=$(date -u +%-H)
          IN_SESSION=false
          if ( [ "$HOUR" -ge 4 ] && [ "$HOUR" -lt 10 ] ) || ( [ "$HOUR" -ge 13 ] && [ "$HOUR" -lt 21 ] ); then
            IN_SESSION=true
          fi
          echo "In sessie: $IN_SESSION (UTC uur: $HOUR)"

          if [ "$IN_SESSION" = "true" ] && [ "$MINUTEN" -gt 35 ]; then
            echo "Analyse $MINUTEN min geleden — nu triggeren!"

            # WhatsApp alert alleen als echt lang (>90 min)
            if [ "$MINUTEN" -gt 90 ]; then
              curl -s -X POST \
                "https://api.twilio.com/2010-04-01/Accounts/$TWILIO_SID/Messages.json" \
                -u "$TWILIO_SID:$TWILIO_TOKEN" \
                --data-urlencode "From=whatsapp:+14155238886" \
                --data-urlencode "To=whatsapp:+32497939310" \
                --data-urlencode "Body=XAUUSD ALERT: Geen analyse in ${MINUTEN} min. Wordt nu herstart."
              echo "WhatsApp alert verstuurd"
            fi

            # Analyse triggeren via workflow_dispatch
            curl -s -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/MattsVR420/trading-gold/actions/workflows/trading-analysis.yml/dispatches" \
              -d '{"ref":"main"}'
            echo "Analyse getriggerd"

          elif [ "$IN_SESSION" = "false" ] && [ "$MINUTEN" -gt 300 ]; then
            echo "ALERT buiten sessie: $MINUTEN min zonder update!"
            curl -s -X POST \
              "https://api.twilio.com/2010-04-01/Accounts/$TWILIO_SID/Messages.json" \
              -u "$TWILIO_SID:$TWILIO_TOKEN" \
              --data-urlencode "From=whatsapp:+14155238886" \
              --data-urlencode "To=whatsapp:+32497939310" \
              --data-urlencode "Body=XAUUSD ALERT: Systeem ${MINUTEN} min zonder update (buiten sessie)."
            echo "WhatsApp alert verstuurd"

          else
            echo "Systeem OK — laatste analyse $MINUTEN min geleden"
          fi
