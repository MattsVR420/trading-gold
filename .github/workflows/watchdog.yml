name: XAUUSD Systeem Watchdog

on:
  schedule:
    # Basis: elke 4u op het halve uur (tussen analyses door)
    - cron: '30 1,5,9,11,13,17,21 * * *'
    # Prime time weekdagen: elk half uur controleren tussen 14-18u Belgisch (12-16u UTC)
    - cron: '30 12,13,14,15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Controleer systeem en stuur alert indien nodig
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== XAUUSD Watchdog ==="
          date -u

          # Laatste commit ophalen via jq voor betrouwbare parsing
          RESPONSE=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/repos/MattsVR420/trading-gold/commits?per_page=1")
          LAST=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['commit']['committer']['date'])" 2>/dev/null || echo "")
          echo "Laatste commit: $LAST"

          # Uren geleden berekenen — val terug op 0 als datum ongeldig
          NOW=$(date -u +%s)
          if [ -z "$LAST" ]; then
            COMMIT_TS=0
            UREN=999
          else
            COMMIT_TS=$(date -u -d "$LAST" +%s 2>/dev/null || echo 0)
            if [ "$COMMIT_TS" -eq 0 ]; then
              UREN=999
            else
              UREN=$(( (NOW - COMMIT_TS) / 3600 ))
            fi
          fi
          echo "Uren geleden: $UREN"

          if [ "$UREN" -gt 5 ]; then
            echo "ALERT: Systeem $UREN uur zonder update!"

            # WhatsApp alert sturen
            curl -s -X POST \
              "https://api.twilio.com/2010-04-01/Accounts/$TWILIO_SID/Messages.json" \
              -u "$TWILIO_SID:$TWILIO_TOKEN" \
              --data-urlencode "From=whatsapp:+14155238886" \
              --data-urlencode "To=whatsapp:+32497939310" \
              --data-urlencode "Body=XAUUSD SYSTEEM ALERT: Geen update ontvangen in ${UREN}u. Systeem wordt automatisch herstart."
            echo "WhatsApp alert verstuurd"

            # Analyse automatisch herstarten
            curl -s -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/MattsVR420/trading-gold/actions/workflows/trading-analysis.yml/dispatches" \
              -d '{"ref":"main"}'
            echo "Analyse workflow herstart"
          else
            echo "Systeem OK - laatste update $UREN uur geleden"
          fi
