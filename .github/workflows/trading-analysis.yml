name: XAUUSD Trading Analyse

on:
  schedule:
    # SESSIE 1: 06:00 CEST (04:00 UTC) → 12:00 CEST (10:00 UTC), elk 30 min
    - cron: '0,30 4,5,6,7,8,9 * * *'
    - cron: '0 10 * * *'
    # SESSIE 2: 15:00 CEST (13:00 UTC) → 23:00 CEST (21:00 UTC), elk 30 min
    - cron: '0,30 13,14,15,16,17,18,19,20 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install yfinance pandas matplotlib requests --quiet

      - name: Twilio credentials aanmaken
        run: |
          printf '{"sid":"%s","token":"%s"}' "$TWILIO_SID" "$TWILIO_TOKEN" > creds.json
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}

      - name: Analyse uitvoeren
        run: python run.py
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}

      - name: Resultaten pushen naar GitHub
        run: |
          git config user.email "bot@mvr.be"
          git config user.name "MVR Bot"
          git add reports/ charts/ latest.json "dagboek traden/" || true
          git diff --cached --quiet || git commit -m "XAUUSD auto $(date -u +%Y-%m-%d_%H%M) UTC"
          git pull --rebase origin main || true
          git push || (sleep 10 && git pull --rebase origin main && git push)

  relay:
    needs: analyse
    runs-on: ubuntu-latest
    steps:
      - name: Wacht 28 min en trigger volgende analyse (alleen in sessie)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          HOUR=$(date -u +%-H)
          in_session() { ( [ "$1" -ge 4 ] && [ "$1" -lt 10 ] ) || ( [ "$1" -ge 13 ] && [ "$1" -lt 21 ] ); }
          if ! in_session "$HOUR"; then
            echo "Buiten sessie (UTC ${HOUR}u) — relay stopt"
            exit 0
          fi
          echo "In sessie (UTC ${HOUR}u) — wacht 28 minuten..."
          sleep 1680
          # Hercheck sessie NA sleep — voorkomt analyses na sessie-einde
          HOUR=$(date -u +%-H)
          if ! in_session "$HOUR"; then
            echo "Sessie voorbij na sleep (UTC ${HOUR}u) — geen nieuwe analyse"
            exit 0
          fi
          # Controleer latest.json tijdstip (alleen analyses updaten dit, geen code-pushes)
          LAST=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://raw.githubusercontent.com/MattsVR420/trading-gold/main/latest.json" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tijdstip'])" 2>/dev/null || echo "")
          NOW=$(date -u +%s)
          ANALYSE_TS=$(date -u -d "$LAST UTC" +%s 2>/dev/null || echo 0)
          MINUTEN=$(( (NOW - ANALYSE_TS) / 60 ))
          echo "Laatste analyse: $LAST ($MINUTEN min geleden)"
          if [ "$MINUTEN" -gt 25 ]; then
            curl -s -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/MattsVR420/trading-gold/actions/workflows/trading-analysis.yml/dispatches" \
              -d '{"ref":"main"}'
            echo "Volgende analyse getriggerd (laatste was ${MINUTEN} min geleden)"
          else
            echo "Analyse al recent uitgevoerd (${MINUTEN} min geleden) — sla over"
          fi
