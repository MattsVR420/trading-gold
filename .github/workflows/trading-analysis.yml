name: XAUUSD Trading Analyse

on:
  schedule:
    # Basis: elke 4u (02/06/10/14/18/22u Belgisch)
    - cron: '0 */4 * * *'
    # Ochtend elk uur 08-13u Belgisch (06-11u UTC) weekdagen
    - cron: '0 6,7,8,9,10,11 * * 1-5'
    # Prime time elk uur 14-18u Belgisch (12-16u UTC) weekdagen
    - cron: '0 12,13,14,15,16 * * 1-5'
    # Avond elk uur 19-21u Belgisch (17-19u UTC) weekdagen
    - cron: '0 17,18,19 * * 1-5'
    # Zondagavond: markt herstart + elk uur tot middernacht (21-23u UTC = 23u-01u Belgisch)
    - cron: '0 21,22,23 * * 0'
    # Vroege maandag: elk uur 00-05u UTC (02-07u Belgisch) voor continuïteit na weekend
    - cron: '0 1,2,3,5 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install yfinance pandas matplotlib --quiet

      - name: Twilio credentials aanmaken
        run: |
          printf '{"sid":"%s","token":"%s"}' "$TWILIO_SID" "$TWILIO_TOKEN" > creds.json
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}

      - name: Analyse uitvoeren
        run: python run.py
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}

      - name: Resultaten pushen naar GitHub
        run: |
          git config user.email "bot@mvr.be"
          git config user.name "MVR Bot"
          git add reports/ charts/ latest.json "dagboek traden/" || true
          git diff --cached --quiet || git commit -m "XAUUSD auto $(date -u +%Y-%m-%d_%H%M) UTC"
          git push
